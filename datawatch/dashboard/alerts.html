<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>datawatch Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="min-h-screen">
    <nav class="dw-navbar sticky top-0 z-20">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="/" class="dw-brand text-xl">datawatch</a>
            <div class="flex items-center gap-5 text-sm font-medium">
                <a href="/" class="dw-nav-link">Dashboard</a>
                <a href="/alerts" class="dw-nav-link active">Alerts</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <header class="mb-5 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-slate-100">All Alerts</h1>
                <p class="text-sm text-slate-400">Filter by severity and inspect full alert history.</p>
            </div>
            <p class="text-xs text-slate-400">Auto-refresh: every 30 seconds | Last updated: <span id="alerts-last-updated">--</span></p>
        </header>

        <section class="dw-card p-4">
            <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex flex-wrap gap-2" role="group" aria-label="Severity filters">
                    <button id="filter-all" class="filter-btn active" data-severity="ALL" type="button">All</button>
                    <button id="filter-critical" class="filter-btn" data-severity="CRITICAL" type="button">Critical</button>
                    <button id="filter-warning" class="filter-btn" data-severity="WARNING" type="button">Warning</button>
                </div>
                <div class="text-sm text-slate-300">Showing <span id="alerts-visible-count">0</span> of <span id="alerts-total-count">0</span></div>
            </div>

            <div id="alerts-empty" class="empty-state hidden">No alerts yet</div>

            <div id="alerts-table-wrap" class="dw-table-wrap overflow-x-auto">
                <table class="dw-table min-w-full">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>ID</th>
                            <th>Pipeline</th>
                            <th>Column</th>
                            <th>Type</th>
                            <th>Severity</th>
                            <th>Score</th>
                            <th>Details</th>
                            <th>Acknowledged</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/js/alerts.js"></script>
</body>
</html>
